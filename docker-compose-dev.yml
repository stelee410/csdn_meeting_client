# 本地开发环境 - Docker Compose
# 使用: docker compose -f docker-compose-dev.yml up -d
# 应用连接: spring.profiles.active=dev (application-dev.yml)

services:
  mysql:
    image: mysql:5.7
    container_name: csdn-meeting-mysql-dev
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: csdn_meeting
      MYSQL_CHARSET: utf8mb4
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_dev_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mysql_dev_data:
