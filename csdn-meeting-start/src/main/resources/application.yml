server:
  port: 8080

spring:
  application:
    name: csdn-meeting-client

  # 国际化配置
  messages:
    basename: i18n/meeting-messages
    encoding: UTF-8
    fallback-to-system-locale: false

  datasource:
    url: jdbc:mysql://118.145.66.85:3306/csdn_meeting?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: Aa123456
    type: com.alibaba.druid.pool.DruidDataSource

    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: true
      test-on-return: false
      keep-alive: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

# 图片上传配置
upload:
  image:
    # 图片保存的本地磁盘目录（支持绝对路径，如 /data/uploads/images）
    base-path: ./uploads/images
    # 图片对外访问的 URL 前缀（需与 server.port 和部署域名保持一致）
    access-url-prefix: http://localhost:8080/uploads/images

# CSDN消息推送配置
csdn:
  message:
    # 应用Key和密钥（生产环境建议通过环境变量或配置中心注入）
    # 文档要求AppKey: Conference_New_Notice
    app-key: ${CSDN_APP_KEY:Conference_New_Notice}
    app-secret: ${CSDN_APP_SECRET:086e138b358948b8a30a8b29313bb45f}
    # 接口基础URL
    base-url: https://msg.csdn.net
    # 模板编码配置
    templates:
      # 会议发布IM站内信模板 (文档要求: New_Notice_IM)
      meeting-publish-im: New_Notice_IM
      # 会议发布APP推送模板 (文档要求: New_Notice_PUSH)
      meeting-publish-push: New_Notice_PUSH
