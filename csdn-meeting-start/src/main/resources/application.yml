server:
  port: 8080

spring:
  application:
    name: csdn-meeting-client

  # 国际化配置
  messages:
    basename: i18n/meeting-messages
    encoding: UTF-8
    fallback-to-system-locale: false

  datasource:
    url: jdbc:mysql://118.145.66.85:3306/csdn_meeting?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: Aa123456
    type: com.alibaba.druid.pool.DruidDataSource

    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: true
      test-on-return: false
      keep-alive: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.csdn.meeting.infrastructure.mapper,com.csdn.meeting.infrastructure.po,com.csdn.meeting.infrastructure.po.analytics
  configuration:
    map-underscore-to-camel-case: true

# 图片上传配置
upload:
  image:
    # 图片保存的本地磁盘目录（支持绝对路径，如 /data/uploads/images）
    base-path: ./uploads/images
    # 图片对外访问的 URL 前缀（需与 server.port 和部署域名保持一致）
    access-url-prefix: http://118.145.66.85:8080/uploads/images/

# CSDN消息推送配置
# TODO【需与CSDN协调】：
# 1. 确认消息中心接口文档和鉴权方式（已完成：Base URL、AppKey、AppSecret）
# 2. 确认消息模板编码（已完成：New_Notice_IM, New_Notice_PUSH）
# 3. 确认报名审核通知模板编码（已完成：Verify_Success_IM等）
# 4. 确认模板变量格式（meetingTitle, meetingId等）
# 5. 确认消息发送频率限制和频控策略
csdn:
  message:
    # 会议发布推送配置（应用Key和密钥，生产环境建议通过环境变量或配置中心注入）
    # 文档要求AppKey: Conference_New_Notice
    app-key: ${CSDN_APP_KEY:Conference_New_Notice}
    app-secret: ${CSDN_APP_SECRET:086e138b358948b8a30a8b29313bb45f}
    # 审核推送专用配置
    verify-app-key: Conference_Verify_Notice
    verify-app-secret: ${CSDN_VERIFY_APP_SECRET:6ba09ff6d4254abb8c6f92f1265edf3e}
    # 接口基础URL
    base-url: https://msg.csdn.net
    # 模板编码配置
    templates:
      # 会议发布IM站内信模板 (文档要求: New_Notice_IM)
      meeting-publish-im: New_Notice_IM
      # 会议发布APP推送模板 (文档要求: New_Notice_PUSH)
      meeting-publish-push: New_Notice_PUSH
      # 审核通过IM站内信模板
      verify-success-im: Verify_Success_IM
      # 审核通过APP推送模板
      verify-success-push: Verify_Success_PUSH
      # 审核失败IM站内信模板
      verify-failure-im: Verify_Failure_IM
      # 审核失败APP推送模板
      verify-failure-push: Verify_Failure_PUSH

# 签到配置
# TODO【需与CSDN协调】：
# 1. 确认二维码Scheme协议（当前 app://csdn.meeting/checkin）
# 2. 确认是否需要支持微信扫码跳转H5页面
# 3. 确认高安全级别会议是否需要动态刷新二维码
checkin:
  # 签到码签名密钥（生产环境建议使用更复杂的密钥，并通过环境变量注入）
  signing-key: ${CHECKIN_SIGNING_KEY:csdn-meeting-checkin-secret-key-2026}
  # 二维码Scheme（APP扫码后跳转的协议）
  # TODO【需与CSDN App对接】：与CSDN App团队确认Scheme协议
  scheme: app://csdn.meeting/checkin
  # 微信小程序Scheme（小程序扫码后跳转的页面路径）
  # TODO【需CSDN小程序对接】：与微信小程序团队确认页面路径
  miniapp-scheme: /pages/meeting/checkin
  # 二维码有效期（分钟，0表示长期有效）
  code-validity-minutes: 0
  # 是否允许重复签到（false时重复签到会提示已签到）
  allow-duplicate: false

# 报名配置
# TODO【需与CSDN协调】：
# 1. 确认报名表单字段配置（当前提供姓名、手机号、邮箱、公司、职位）
# 2. 确认用户画像数据来源和接口
# 3. 确认是否需要接入CSDN统一支付（如报名收费）
registration:
  # 并发控制
  concurrent:
    # 最大QPS限制
    max-qps: 1000
    # 分布式锁等待超时时间（毫秒）
    lock-timeout-ms: 5000
  # 默认报名表单字段配置（可通过运维接口动态调整）
  default-fields:
    - name: name
      label: 姓名
      required: true
      source: user_profile
    - name: phone
      label: 手机号
      required: true
      source: user_profile
    - name: email
      label: 邮箱
      required: false
      source: user_profile
    - name: company
      label: 公司
      required: false
      source: none
    - name: position
      label: 职位
      required: false
      source: none

logging:
  level:
    com.csdn.meeting.infrastructure.client.AIServiceClient: DEBUG
    com.csdn.meeting.infrastructure.client.DoubaoClient: DEBUG

doubao:
  api-key: ${DOUBAO_API_KEY:ecd79a0c-e5b4-47db-bc8d-dd65a606292a}
  base-url: https://ark.cn-beijing.volces.com/api/v3/responses
  model: doubao-seed-2-0-lite-260215
  image-model: ${DOUBAO_IMAGE_MODEL:doubao-seedream-5-0-260128}
  image-base-url: https://ark.cn-beijing.volces.com/api/v3/images/generations
  # HTTP socket 超时必须大于 ai.parse-timeout-seconds，否则底层 socket 会先断开
  timeout-ms: ${DOUBAO_TIMEOUT_MS:90000}

ai:
  # AI 解析流程总超时（秒）。文档类通常比图片耗时更长。
  parse-timeout-seconds: ${AI_PARSE_TIMEOUT_SECONDS:60}
