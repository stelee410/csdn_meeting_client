# 生产环境 - Docker Compose
# 首次部署: cp .env.example .env，填写真实值后执行 docker compose up -d --build
# 更新部署: git pull && docker compose up -d --build

services:
  mysql:
    image: mysql:8.0
    container_name: csdn-meeting-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: csdn_meeting
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
      - --sql-mode=ONLY_FULL_GROUP_BY,STRICT_TRANS_TABLES,NO_ZERO_IN_DATE,NO_ZERO_DATE,ERROR_FOR_DIVISION_BY_ZERO,NO_ENGINE_SUBSTITUTION
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build: .
    container_name: csdn-meeting-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/csdn_meeting?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      # 图片存储路径（容器内），对应宿主机 ./data/images
      UPLOAD_IMAGE_BASE_PATH: /app/data/images
      # 图片对外访问 URL（经 Nginx 80 端口，无需带端口号）
      UPLOAD_IMAGE_ACCESS_URL_PREFIX: http://${SERVER_HOST}/uploads/images
      CSDN_APP_KEY: ${CSDN_APP_KEY}
      CSDN_APP_SECRET: ${CSDN_APP_SECRET}
    volumes:
      # 宿主机 ./data 目录挂载到容器 /app/data，图片等持久化数据存于此
      - ./data:/app/data

  nginx:
    image: nginx:alpine
    container_name: csdn-meeting-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app

volumes:
  mysql_data:
